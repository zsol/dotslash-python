name: Release

on:
  workflow_dispatch:
  schedule:
    - cron: "1 8 * * *" # 8:01 UTC every day

jobs:
  check-new-release:
    permissions: {}
    name: Check for new release in upstream repo
    runs-on: ubuntu-latest
    outputs:
      upstream_latest: ${{steps.check.outputs.upstream_latest}}
      latest: ${{steps.check.outputs.latest}}
    steps:
      - id: check
        run: |
          UPSTREAM_LATEST=$(curl https://api.github.com/repos/astral-sh/python-build-standalone/releases/latest | jq -r .tag_name)
          echo "upstream_latest=${UPSTREAM_LATEST}" | tee -a $GITHUB_OUTPUT
          LATEST=$(curl https://api.github.com/repos/${{github.repository}}/releases/latest | jq -r .name)
          echo "latest=${LATEST}" | tee -a $GITHUB_OUTPUT

  build:
    permissions:
      attestations: write
      id-token: write
    uses: ./.github/workflows/ci.yml
  release:
    needs: [build, check-new-release]
    if: ${{
      ! startsWith(
      needs.check-new-release.outputs.latest,
      needs.check-new-release.outputs.upstream_latest
      )
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        run: |
          gh release create "$UPSTREAM_LATEST" -t "$UPSTREAM_LATEST" -n "See https://github.com/astral-sh/python-build-standalone/releases/tag/$UPSTREAM_LATEST" dist/*
        env:
          UPSTREAM_LATEST: ${{needs.check-new-release.outputs.upstream_latest}}
